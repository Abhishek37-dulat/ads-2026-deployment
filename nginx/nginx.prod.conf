events { worker_connections 1024; }

http {
  resolver 127.0.0.11 valid=10s ipv6=off;
  map $http_upgrade $connection_upgrade { default upgrade; '' close; }

  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_read_timeout 120s;
  client_max_body_size 50m;

  # ---------- HTTP: ACME challenge + redirect everything to HTTPS ----------
  server {
    listen 80;
    server_name d0187.in www.d0187.in admin.d0187.in;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # ---------- Advertiser app (apex + www) ----------
  server {
    listen 443 ssl;
    http2 on;
    server_name d0187.in www.d0187.in;

    ssl_certificate     /etc/letsencrypt/live/d0187.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/d0187.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /v1/stream {
      set $backend backend; proxy_pass http://$backend:8080;
      proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
    }
    location /api/    { set $backend backend; proxy_pass http://$backend:8080; }
    location /v1/     { set $backend backend; proxy_pass http://$backend:8080; }
    location /graphql { set $backend backend; proxy_pass http://$backend:8080; }
    location / {
      set $frontend frontend; proxy_pass http://$frontend:3000;
      proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
    }
  }

  # ---------- Admin / Ops console (dedicated subdomain, served at root) ----------
  server {
    listen 443 ssl;
    http2 on;
    server_name admin.d0187.in;

    ssl_certificate     /etc/letsencrypt/live/d0187.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/d0187.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/ { set $backend backend; proxy_pass http://$backend:8080; }
    location /v1/  { set $backend backend; proxy_pass http://$backend:8080; }
    location / {
      set $admin admin-ui; proxy_pass http://$admin:3001;
      proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection $connection_upgrade;
    }
  }
}
