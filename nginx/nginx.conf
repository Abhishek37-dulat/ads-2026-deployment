events { worker_connections 1024; }

http {
  # Docker's embedded DNS — re-resolve upstreams so a container restart (new IP) doesn't 502.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # WebSocket upgrade plumbing
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # shared proxy headers
  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_read_timeout 120s;

  server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    # --- realtime stream (WebSocket) — must come before /v1/ ---
    location /v1/stream {
      set $backend backend;
      proxy_pass http://$backend:8080;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
    }

    # --- backend API + docs ---
    location /api/        { set $backend backend; proxy_pass http://$backend:8080; }
    location /v1/         { set $backend backend; proxy_pass http://$backend:8080; }
    location /graphql     { set $backend backend; proxy_pass http://$backend:8080; }
    location /actuator/   { set $backend backend; proxy_pass http://$backend:8080; }
    location /swagger-ui/ { set $backend backend; proxy_pass http://$backend:8080; }
    location = /swagger-ui.html { set $backend backend; proxy_pass http://$backend:8080; }
    location /v3/api-docs  { set $backend backend; proxy_pass http://$backend:8080; }

    # --- admin console (Next.js, basePath /admin) ---
    location /admin {
      set $admin admin-ui;
      proxy_pass http://$admin:3001;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    # --- everything else → Next.js frontend (incl. /_next static assets) ---
    location / {
      set $frontend frontend;
      proxy_pass http://$frontend:3000;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
