# Production overrides — use together with the base file:
#   docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Adds HTTPS (443) + Let's Encrypt (certbot), serves the admin console at admin.d0187.in (root),
# and builds the SPAs for same-origin production use.

services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}

  clickhouse:
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:?CLICKHOUSE_USER is required}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:?CLICKHOUSE_DB is required}

  temporal-ui:
    ports: !override []

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports: !override []

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: docker,prod
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      RELAY_CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}
      RELAY_S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      RELAY_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      RELAY_AUTH_JWT_SECRET: ${RELAY_AUTH_JWT_SECRET:?RELAY_AUTH_JWT_SECRET is required}
      RELAY_ADMIN_EMAIL: ${RELAY_ADMIN_EMAIL:?RELAY_ADMIN_EMAIL is required}
      RELAY_ADMIN_PASSWORD: ${RELAY_ADMIN_PASSWORD:?RELAY_ADMIN_PASSWORD is required}
      RELAY_CORS_ORIGINS: ${RELAY_CORS_ORIGINS:?RELAY_CORS_ORIGINS is required}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required}
      RELAY_CREDENTIAL_ENCRYPTION_KEY: ${RELAY_CREDENTIAL_ENCRYPTION_KEY:?RELAY_CREDENTIAL_ENCRYPTION_KEY is required}
      RELAY_META_ENABLED: ${RELAY_META_ENABLED:-false}
      RELAY_META_PUBLISH_ENABLED: ${RELAY_META_PUBLISH_ENABLED:-false}
      META_APP_ID: ${META_APP_ID:?META_APP_ID is required}
      META_APP_SECRET: ${META_APP_SECRET:?META_APP_SECRET is required}
      META_LOGIN_CONFIG_ID: ${META_LOGIN_CONFIG_ID:?META_LOGIN_CONFIG_ID is required}
      META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION:?META_GRAPH_API_VERSION is required}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:?META_WEBHOOK_VERIFY_TOKEN is required}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS is required}
      MAIL_FROM: ${MAIL_FROM:?MAIL_FROM is required}
      FAST2SMS_API_KEY: ${FAST2SMS_API_KEY:?FAST2SMS_API_KEY is required}
    ports: !override []

  # admin built WITHOUT a basePath → served at the root of admin.d0187.in
  admin-ui:
    build:
      args:
        NEXT_BASE_PATH: ""

  # frontend stays same-origin (relative API calls); no override needed beyond clarity
  frontend:
    build:
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
        NEXT_PUBLIC_WS_BASE_URL: ""

  nginx:
    ports: !override
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # reload every 6h so renewed certs are picked up without downtime
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot
    container_name: relay-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # auto-renew twice a day; issuance is done once via init-letsencrypt.sh
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
